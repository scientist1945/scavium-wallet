name: scavium_wallet
description: SCAVIUM Wallet - self-custody wallet for the SCAVIUM network
publish_to: "none"

version: 0.2.0+2

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^16.0.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  local_auth: ^2.3.0
  google_fonts: ^6.3.0

  http: ^1.2.2
  web3dart: ^2.7.3
  bip39: ^1.0.6
  bip32: ^2.0.0
  hex: ^0.2.0
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/logo/
    - assets/branding/icon/
    - assets/branding/favicon/
    - assets/branding/token/  