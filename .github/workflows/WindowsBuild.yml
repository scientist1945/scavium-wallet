name: Build Flutter Windows

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Habilitar soporte para Windows
      run: flutter config --enable-windows-desktop

    - name: Instalar dependencias
      run: flutter pub get

    - name: Compilar para Windows (Release)
      run: flutter build windows --release

    - name: Subir la aplicación generada
      uses: actions/upload-artifact@v4
      with:
        name: Scavium-Wallet-Windows
        # Esta es la ruta estándar donde Flutter guarda los ejecutables de Windows
        path: build\windows\x64\runner\Release\*
