name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Dart dependencies
        run: flutter pub get

      - name: Validate tag vs pubspec version
        if: startsWith(github.ref, 'refs/tags/')
        run: dart run tool/build.dart --check-version --expected-tag "${GITHUB_REF_NAME}"

      - name: Skip tag validation for manual runs
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: echo "Manual workflow run detected; skipping tag validation"

  build_android:
    name: Build Android release artifacts
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Restore Android signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEY_PROPERTIES_B64: ${{ secrets.ANDROID_KEY_PROPERTIES_B64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_B64" ]; then
            echo "Missing secret: ANDROID_KEYSTORE_B64"
            exit 1
          fi

          if [ -z "$ANDROID_KEY_PROPERTIES_B64" ]; then
            echo "Missing secret: ANDROID_KEY_PROPERTIES_B64"
            exit 1
          fi

          mkdir -p android/keystores
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > android/keystores/scavium-wallet-upload.jks
          echo "$ANDROID_KEY_PROPERTIES_B64" | base64 -d > android/key.properties

      - name: Build Android App Bundle
        run: dart run tool/build.dart --platform android-bundle --no-version-bump --skip-clean

      - name: Build Android APK
        run: dart run tool/build.dart --platform android-apk --no-version-bump --skip-clean

      - name: Rename Android artifacts
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed -E 's/version:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+)\+[0-9]+/\1/')
          mkdir -p release-artifacts
          cp build/app/outputs/bundle/release/app-release.aab "release-artifacts/scavium_wallet-${VERSION}-android.aab"
          cp build/app/outputs/flutter-apk/app-release.apk "release-artifacts/scavium_wallet-${VERSION}-android.apk"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-artifacts
          path: release-artifacts/*

  build_windows_msix:
    name: Build Windows MSIX release artifact
    runs-on: windows-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Restore MSIX certificate
        shell: pwsh
        env:
          SCAVIUM_MSIX_CERT_B64: ${{ secrets.SCAVIUM_MSIX_CERT_B64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SCAVIUM_MSIX_CERT_B64)) {
            Write-Error "Missing secret: SCAVIUM_MSIX_CERT_B64"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path .ci | Out-Null
          [System.IO.File]::WriteAllBytes(".ci\scavium-release.pfx", [System.Convert]::FromBase64String($env:SCAVIUM_MSIX_CERT_B64))

      - name: Build Windows MSIX
        shell: pwsh
        env:
          SCAVIUM_MSIX_CERT_PATH: ${{ github.workspace }}\.ci\scavium-release.pfx
          SCAVIUM_MSIX_CERT_PASSWORD: ${{ secrets.SCAVIUM_MSIX_CERT_PASSWORD }}
          SCAVIUM_MSIX_LOGO_PATH: ${{ github.workspace }}\windows\runner\resources\app_logo.png
        run: dart run tool/build.dart --platform windows-msix --no-version-bump --skip-clean

      - name: Rename Windows artifact
        shell: pwsh
        run: |
          $pubspec = Get-Content pubspec.yaml -Raw
          if ($pubspec -match 'version:\s*([0-9]+\.[0-9]+\.[0-9]+)\+\d+') {
            $version = $matches[1]
          } else {
            Write-Error "Could not resolve semantic version from pubspec.yaml"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          $msix = Get-ChildItem -Path build\windows -Filter *.msix -Recurse | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if (-not $msix) {
            Write-Error "MSIX artifact not found"
            exit 1
          }

          Copy-Item $msix.FullName "release-artifacts\scavium_wallet-$version-windows.msix"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-artifacts
          path: release-artifacts\*

  publish_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build_android
      - build_windows_msix

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release-artifacts
          path: release-assets/android

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release-artifacts
          path: release-assets/windows

      - name: Create SHA256 checksums
        shell: bash
        run: |
          cd release-assets
          find . -type f -print0 | while IFS= read -r -d '' file; do
            sha256sum "$file" >> SHA256SUMS.txt
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            release-assets/android/*
            release-assets/windows/*
            release-assets/SHA256SUMS.txt